    <line x1="256" y1="310" x2="256" y2="288"/>
    <line x1="160" y1="192" x2="138" y2="192"/>
    <line x1="374" y1="192" x2="352" y2="192"/>
    <line x1="188" y1="124" x2="172" y2="108"/>
    <line x1="340" y1="276" x2="324" y2="260"/>
    <line x1="324" y1="124" x2="340" y2="108"/>
    <line x1="172" y1="276" x2="188" y2="260"/>
