  <g stroke="#f5c842" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="96" y1="36" x2="96" y2="28"/>
    <line x1="96" y1="116" x2="96" y2="108"/>
    <line x1="60" y1="72" x2="52" y2="72"/>
    <line x1="140" y1="72" x2="132" y2="72"/>
    <line x1="71" y1="47" x2="65" y2="41"/>
    <line x1="127" y1="103" x2="121" y2="97"/>
    <line x1="121" y1="47" x2="127" y2="41"/>
    <line x1="65" y1="103" x2="71" y2="97"/>
  </g>
  <!-- ODT label -->
  <text x="96" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#d4cfff" letter-spacing="3">ODT</text>
</svg>
